<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="Prajwal B R - AI and Software Developer">
  <defs>
    <radialGradient id="bgGlow" cx="22%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#152a4d"/>
      <stop offset="45%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>
    <linearGradient id="cyanMag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7defff"/>
      <stop offset="40%" stop-color="#38e1c8"/>
      <stop offset="70%" stop-color="#7b8cff"/>
      <stop offset="100%" stop-color="#c46bff"/>
    </linearGradient>
    <radialGradient id="core" cx="36%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#eafff9"/>
      <stop offset="40%" stop-color="#5fe9d6"/>
      <stop offset="78%" stop-color="#2a9bd6"/>
      <stop offset="100%" stop-color="#163a6b"/>
    </radialGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <path id="orbit" d="M -150,0 a 150,52 0 1,0 300,0 a 150,52 0 1,0 -300,0"/>

    <clipPath id="titleClip">
      <text x="556" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="1">PRAJWAL B R</text>
    </clipPath>
    <clipPath id="typeClip">
      <rect x="558" y="240" width="0" height="44">
        <animate attributeName="width" values="0;0;520;520;0" keyTimes="0;0.05;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1280" height="420" fill="url(#bgGlow)"/>

  <!-- drifting particles -->
  <g fill="#7fb0ff">
    <circle cx="120" cy="70"  r="1.8" opacity="0.7"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="40"  r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.1s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="300" r="2.0" opacity="0.6"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.9s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="372" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.7s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="90" r="1.6" opacity="0.6"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.2s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="360" r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.4s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="46"  r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="5.0s" begin="0.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ============ 3D ORBITAL SCENE (left) ============ -->
  <g transform="translate(268 210)">
    <circle r="120" fill="url(#core)" opacity="0.16" filter="url(#bigGlow)">
      <animate attributeName="r" values="110;128;110" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.24;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- spinning wireframe cube (pseudo-3D) -->
    <g stroke="#3f6ea8" stroke-width="1.4" fill="none" opacity="0.5">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="24s" repeatCount="indefinite"/>
        <polygon points="-58,-58 58,-58 58,58 -58,58"/>
        <polygon points="-34,-78 82,-78 82,38 -34,38"/>
        <line x1="-58" y1="-58" x2="-34" y2="-78"/>
        <line x1="58"  y1="-58" x2="82"  y2="-78"/>
        <line x1="58"  y1="58"  x2="82"  y2="38"/>
        <line x1="-58" y1="58"  x2="-34" y2="38"/>
      </g>
    </g>

    <!-- tilted orbit rings -->
    <g fill="none" stroke-width="1.6">
      <g transform="rotate(0)"   stroke="#38e1c8" opacity="0.8"><use xlink:href="#orbit"/></g>
      <g transform="rotate(60)"  stroke="#7b8cff" opacity="0.8"><use xlink:href="#orbit"/></g>
      <g transform="rotate(120)" stroke="#c46bff" opacity="0.8"><use xlink:href="#orbit"/></g>
    </g>

    <!-- nodes traveling along rings -->
    <g transform="rotate(0)">
      <circle r="7" fill="#38e1c8" filter="url(#soft)">
        <animateMotion dur="7s" repeatCount="indefinite"><mpath xlink:href="#orbit"/></animateMotion>
      </circle>
    </g>
    <g transform="rotate(60)">
      <circle r="7" fill="#7b8cff" filter="url(#soft)">
        <animateMotion dur="9s" begin="-2s" repeatCount="indefinite"><mpath xlink:href="#orbit"/></animateMotion>
      </circle>
    </g>
    <g transform="rotate(120)">
      <circle r="7" fill="#c46bff" filter="url(#soft)">
        <animateMotion dur="11s" begin="-5s" repeatCount="indefinite"><mpath xlink:href="#orbit"/></animateMotion>
      </circle>
    </g>

    <!-- glowing core -->
    <circle r="32" fill="url(#core)" filter="url(#soft)">
      <animate attributeName="r" values="29;34;29" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="32" fill="none" stroke="#d7fff7" stroke-width="1.2" opacity="0.7"/>
    <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#04212b">PBR</text>
    <text x="0" y="66" text-anchor="middle" font-family="Consolas, monospace" font-size="12" letter-spacing="3" fill="#5fe9d6" opacity="0.85">BUILD</text>
  </g>

  <!-- ============ NAME + ROLE (right) ============ -->
  <g clip-path="url(#titleClip)">
    <rect x="552" y="120" width="640" height="110" fill="url(#cyanMag)"/>
    <rect x="-200" y="110" width="120" height="140" fill="#ffffff" opacity="0.45" transform="skewX(-22)">
      <animate attributeName="x" values="380;1260;1260" keyTimes="0;0.55;1" dur="4.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="1" fill="none" stroke="#0b3a4a" stroke-width="0.7" opacity="0.5">PRAJWAL B R</text>

  <!-- typed role with blinking cursor -->
  <g clip-path="url(#typeClip)">
    <text x="558" y="274" font-family="Consolas, Menlo, monospace" font-size="30" fill="#e7eefc">&#62;&#160;AI&#160;&#47;&#160;Software&#160;Developer</text>
  </g>
  <rect x="558" y="248" width="3" height="32" fill="#38e1c8">
    <animate attributeName="x" values="558;558;1075;1075;558" keyTimes="0;0.05;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- domain legend -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#9fb4d4">
    <circle cx="564" cy="320" r="5" fill="#38e1c8"/><text x="577" y="325">AI / ML</text>
    <circle cx="676" cy="320" r="5" fill="#7b8cff"/><text x="689" y="325">Full-Stack</text>
    <circle cx="816" cy="320" r="5" fill="#c46bff"/><text x="829" y="325">Cloud / Data</text>
  </g>

  <!-- ============ NEURAL WAVE (bottom) ============ -->
  <g opacity="0.85">
    <path fill="none" stroke="#2f64a8" stroke-width="2.5" stroke-linecap="round"
      d="M0,392 C 120,360 220,420 340,392 S 560,360 680,392 S 900,420 1020,392 S 1240,360 1380,392">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="M0,392 C 120,360 220,420 340,392 S 560,360 680,392 S 900,420 1020,392 S 1240,360 1380,392;
                M0,392 C 120,420 220,360 340,392 S 560,420 680,392 S 900,360 1020,392 S 1240,420 1380,392;
                M0,392 C 120,360 220,420 340,392 S 560,360 680,392 S 900,420 1020,392 S 1240,360 1380,392"/>
    </path>
    <path fill="none" stroke="#38e1c8" stroke-width="2" stroke-linecap="round" opacity="0.55"
      d="M0,398 C 140,372 240,418 360,398 S 600,372 720,398 S 960,418 1080,398 S 1320,372 1420,398">
      <animate attributeName="d" dur="7.5s" repeatCount="indefinite"
        values="M0,398 C 140,372 240,418 360,398 S 600,372 720,398 S 960,418 1080,398 S 1320,372 1420,398;
                M0,398 C 140,418 240,372 360,398 S 600,418 720,398 S 960,372 1080,398 S 1320,418 1420,398;
                M0,398 C 140,372 240,418 360,398 S 600,372 720,398 S 960,418 1080,398 S 1320,372 1420,398"/>
    </path>
  </g>
</svg>
